# nixpacks.toml — Configuración de build para Railway (Nixpacks)
# Declara explícitamente las extensiones PHP que necesita Laravel 13.
# Sin este archivo Railway puede omitir pdo_mysql, gd o zip.

[phases.setup]
nixPkgs = [
  "php83",
  "php83Extensions.pdo",
  "php83Extensions.pdo_mysql",
  "php83Extensions.gd",
  "php83Extensions.zip",
  "php83Extensions.mbstring",
  "php83Extensions.xml",
  "php83Extensions.bcmath",
  "php83Extensions.fileinfo",
  "php83Extensions.openssl",
  "php83Extensions.curl",
  "composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist"]

[phases.build]
cmds = [
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
